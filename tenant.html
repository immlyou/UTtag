<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UTtag 客戶入口</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --uttag-primary: #0066cc;
      --bg: #f6f7f9;
      --card: #ffffff;
      --muted: #6b7280;
      --border: #e5e7eb;
      --ok: #16a34a;
      --warn: #eab308;
      --off: #9ca3af;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: #111827;
    }
    header.top {
      padding: 56px 24px 16px;
      background: linear-gradient(180deg, rgba(0,102,204,.05), transparent);
    }
    header.top h1 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 600;
    }
    header.top p { margin: 0; color: var(--muted); }
    main {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) 2fr;
      gap: 16px;
      padding: 0 24px 24px;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .card h2 {
      margin: 0;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: #374151;
      background: #fafafa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .count-badge {
      background: var(--uttag-primary);
      color: #fff;
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    th {
      background: #fafafa;
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafbfc; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .status::before {
      content: "";
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--off);
    }
    .status.online::before { background: var(--ok); }
    .status.idle::before   { background: var(--warn); }
    #map {
      height: 520px;
      background: #e5e7eb;
    }
    .empty, .loading {
      padding: 32px;
      text-align: center;
      color: var(--muted);
    }
    .temp {
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }
    .ago {
      font-size: 12px;
      color: var(--muted);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header class="top">
    <h1 id="welcome">載入中…</h1>
    <p id="subtitle"></p>
  </header>

  <main>
    <section class="card">
      <h2>
        <span>我的裝置</span>
        <span id="device-count" class="count-badge">0</span>
      </h2>
      <div id="devices-container">
        <div class="loading">載入裝置清單…</div>
      </div>
    </section>

    <section class="card">
      <h2>
        <span>即時位置</span>
        <span id="map-status" class="ago"></span>
      </h2>
      <div id="map"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/industry-gate.js"></script>
  <script src="/js/tenant-session.js"></script>
  <script>
    // Guard: must be logged in as a tenant user.
    if (!window.TENANT || !TENANT.isLoggedIn()) {
      window.location.replace("/tenant-login.html");
    }

    // Cosmetic: boot industry before we paint so primary color applies.
    if (window.UTTAG && UTTAG.bootIndustry) {
      UTTAG.bootIndustry();
    }

    function timeAgo(iso) {
      if (!iso) return "—";
      const diff = Date.now() - new Date(iso).getTime();
      const s = Math.max(0, Math.round(diff / 1000));
      if (s < 60)   return s + " 秒前";
      if (s < 3600) return Math.round(s / 60) + " 分鐘前";
      if (s < 86400) return Math.round(s / 3600) + " 小時前";
      return Math.round(s / 86400) + " 天前";
    }

    function renderDevices(devices) {
      const container = document.getElementById("devices-container");
      document.getElementById("device-count").textContent = devices.length;

      if (!devices.length) {
        container.innerHTML =
          '<div class="empty">目前沒有綁定任何裝置。<br/>請聯絡管理員以完成裝置綁定。</div>';
        return;
      }

      const rows = devices.map(d => {
        const latest = d.latest_data || {};
        const temp = latest.temperature != null ? latest.temperature.toFixed(1) + "°C" : "—";
        const status = d.status || "offline";
        const statusLabel = { online: "在線", idle: "閒置", offline: "離線" }[status] || status;
        const label = d.label || d.mac;
        return "<tr>" +
          "<td><strong>" + escapeHtml(label) + "</strong><br/><span class=\"ago\">" + escapeHtml(d.mac) + "</span></td>" +
          "<td><span class=\"status " + status + "\">" + statusLabel + "</span></td>" +
          "<td class=\"temp\">" + temp + "</td>" +
          "<td class=\"ago\">" + timeAgo(latest.created_at) + "</td>" +
        "</tr>";
      }).join("");

      container.innerHTML =
        "<table><thead><tr>" +
          "<th>裝置</th><th>狀態</th><th>溫度</th><th>最後回報</th>" +
        "</tr></thead><tbody>" + rows + "</tbody></table>";
    }

    function escapeHtml(s) {
      if (s == null) return "";
      return String(s).replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      })[c]);
    }

    function renderMap(devices) {
      const map = L.map("map").setView([24.15, 120.68], 7);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
      }).addTo(map);

      const pts = [];
      devices.forEach(d => {
        const lat = d.latitude ?? d.lat ?? null;
        const lng = d.longitude ?? d.lng ?? null;
        if (lat == null || lng == null) return;
        pts.push([lat, lng]);
        L.marker([lat, lng])
          .addTo(map)
          .bindPopup("<strong>" + escapeHtml(d.label || d.mac) + "</strong><br/>" + escapeHtml(d.mac));
      });

      if (pts.length) {
        map.fitBounds(pts, { padding: [40, 40], maxZoom: 14 });
        document.getElementById("map-status").textContent = pts.length + " 個位置";
      } else {
        document.getElementById("map-status").textContent = "無座標資料";
      }
    }

    async function fetchJSON(url) {
      const res = await fetch(url, { headers: TENANT.getAuthHeader() });
      if (!res.ok) throw new Error("HTTP " + res.status + " " + url);
      return res.json();
    }

    async function bootstrap() {
      if (!TENANT || !TENANT.isLoggedIn()) return;
      try {
        const [me, devices] = await Promise.all([
          fetchJSON("/api/tenant/auth/me"),
          fetchJSON("/api/tenant/devices"),
        ]);

        const clientName = me?.user?.clients?.name || me?.user?.client_name || "—";
        const userName = me?.user?.name || me?.user?.email || "";
        document.getElementById("welcome").textContent = "嗨，" + userName;
        document.getElementById("subtitle").textContent = clientName + "　·　" +
          (me?.industry_defaults?.display_name || me?.industry || "");

        renderDevices(devices || []);
        renderMap(devices || []);
      } catch (err) {
        console.error("[tenant.html] bootstrap failed:", err);
        document.getElementById("welcome").textContent = "載入失敗";
        document.getElementById("subtitle").textContent = err.message;
      }
    }

    document.addEventListener("DOMContentLoaded", bootstrap);
  </script>
</body>
</html>
