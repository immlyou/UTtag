<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UTtag 客戶入口</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --uttag-primary: #0066cc;
      --bg: #f6f7f9;
      --card: #ffffff;
      --muted: #6b7280;
      --border: #e5e7eb;
      --ok: #16a34a;
      --warn: #eab308;
      --off: #9ca3af;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: #111827;
    }
    header.top {
      padding: 56px 24px 16px;
      background: linear-gradient(180deg, rgba(0,102,204,.05), transparent);
    }
    header.top h1 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 600;
    }
    header.top p { margin: 0; color: var(--muted); }

    nav.tabs {
      margin: 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 4px;
    }
    nav.tabs a {
      padding: 10px 16px;
      text-decoration: none;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      font-weight: 500;
      cursor: pointer;
    }
    nav.tabs a.active {
      color: var(--uttag-primary);
      border-bottom-color: var(--uttag-primary);
    }

    main {
      padding: 16px 24px 24px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .grid-2 {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) 2fr;
      gap: 16px;
    }
    @media (max-width: 900px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .card h2 {
      margin: 0;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      color: #374151;
      background: #fafafa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .count-badge {
      background: var(--uttag-primary);
      color: #fff;
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    th { background: #fafafa; color: var(--muted); font-weight: 500; font-size: 12px; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafbfc; }

    .status {
      display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
    }
    .status::before {
      content: ""; display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--off);
    }
    .status.online::before { background: var(--ok); }
    .status.idle::before   { background: var(--warn); }

    .severity {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 500;
    }
    .severity.warn { background: #fef3c7; color: #92400e; }
    .severity.info { background: #dbeafe; color: #1e40af; }
    .severity.critical { background: #fee2e2; color: #991b1b; }

    #map { height: 520px; background: #e5e7eb; }
    .empty, .loading { padding: 32px; text-align: center; color: var(--muted); }
    .temp { font-variant-numeric: tabular-nums; font-weight: 500; }
    .ago  { font-size: 12px; color: var(--muted); }
    .hidden { display: none !important; }

    .profile-card {
      max-width: 560px;
    }
    .profile-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .profile-row:last-child { border-bottom: none; }
    .profile-row .label { color: var(--muted); }
    .role-pill {
      display: inline-block; padding: 2px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 500; background: #e5e7eb; color: #374151;
    }
    .role-pill.admin    { background: #dbeafe; color: #1e40af; }
    .role-pill.operator { background: #dcfce7; color: #166534; }
    .role-pill.user     { background: #f3f4f6; color: #4b5563; }
  </style>
</head>
<body>
  <div id="impersonation-banner" class="hidden" style="background:#fde68a;color:#78350f;padding:10px 24px;font-size:13px;border-bottom:1px solid #f59e0b;display:flex;justify-content:space-between;align-items:center">
    <span id="impersonation-text"></span>
    <button id="btn-end-impersonation" style="background:#b45309;color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font:inherit">結束代入</button>
  </div>

  <header class="top">
    <h1 id="welcome">載入中…</h1>
    <p id="subtitle"></p>
  </header>

  <nav class="tabs" id="tabs">
    <a data-tab="dashboard" class="active">儀表板</a>
    <a data-tab="alerts">告警</a>
    <a data-tab="usage">用量</a>
    <a data-tab="users">成員</a>
    <a data-tab="profile">帳號</a>
  </nav>

  <main>
    <!-- Dashboard -->
    <section id="tab-dashboard" class="tab-panel active">
      <div class="grid-2">
        <div class="card">
          <h2><span>我的裝置</span><span id="device-count" class="count-badge">0</span></h2>
          <div id="devices-container"><div class="loading">載入裝置清單…</div></div>
        </div>
        <div class="card">
          <h2><span>即時位置</span><span id="map-status" class="ago"></span></h2>
          <div id="map"></div>
        </div>
      </div>
    </section>

    <!-- Alerts -->
    <section id="tab-alerts" class="tab-panel">
      <div class="card">
        <h2><span>近 24 小時告警</span><span id="alert-count" class="count-badge">0</span></h2>
        <div id="alerts-container"><div class="loading">分析中…</div></div>
      </div>
    </section>

    <!-- Usage -->
    <section id="tab-usage" class="tab-panel">
      <div class="card">
        <h2>
          <span>API 用量</span>
          <span style="display:flex;gap:6px;align-items:center;">
            <select id="usage-period" style="padding:5px 8px;border:1px solid var(--border);border-radius:5px;font:inherit;font-size:12px;cursor:pointer;">
              <option value="7d">最近 7 天</option>
              <option value="30d" selected>最近 30 天</option>
              <option value="90d">最近 90 天</option>
            </select>
            <button id="usage-export" style="background:var(--uttag-primary);color:#fff;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;font:inherit;font-size:12px;">CSV 匯出</button>
          </span>
        </h2>
        <div id="usage-container"><div class="loading">載入用量資料…</div></div>
      </div>
    </section>

    <!-- Users -->
    <section id="tab-users" class="tab-panel">
      <div class="card">
        <h2>
          <span>租戶成員<span id="users-note" class="ago" style="margin-left:12px;"></span></span>
          <span>
            <button id="btn-new-member" class="hidden" style="background:var(--uttag-primary);color:#fff;border:none;padding:6px 12px;border-radius:5px;cursor:pointer;font:inherit;font-size:12px">+ 新增成員</button>
            <span id="users-count" class="count-badge" style="margin-left:8px">0</span>
          </span>
        </h2>
        <div id="users-container"><div class="loading">載入成員清單…</div></div>
      </div>
    </section>

    <!-- New-member modal -->
    <div id="member-modal" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center">
      <div style="background:#fff;border-radius:10px;padding:24px;max-width:420px;width:90%">
        <h3 style="margin:0 0 16px">新增成員</h3>
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">Email</label>
        <input id="nm-email" type="email" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;font:inherit" />
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">姓名</label>
        <input id="nm-name" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;font:inherit" />
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">角色</label>
        <select id="nm-role" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;font:inherit">
          <option value="user">user (檢視者)</option>
          <option value="operator">operator (操作員)</option>
          <option value="admin">admin (管理員)</option>
        </select>
        <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">初始密碼</label>
        <input id="nm-pass" type="password" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:12px;font:inherit" />
        <div id="nm-err" style="color:#b91c1c;font-size:12px;margin-bottom:8px"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button id="nm-cancel" style="background:#fff;color:#374151;border:1px solid var(--border);padding:6px 14px;border-radius:5px;cursor:pointer;font:inherit">取消</button>
          <button id="nm-submit" style="background:var(--uttag-primary);color:#fff;border:none;padding:6px 14px;border-radius:5px;cursor:pointer;font:inherit">建立</button>
        </div>
      </div>
    </div>

    <!-- Profile -->
    <section id="tab-profile" class="tab-panel">
      <div class="card profile-card" style="margin-bottom:16px">
        <h2><span>我的帳號</span></h2>
        <div id="profile-container"><div class="loading">載入中…</div></div>
      </div>

      <div id="branding-card" class="card profile-card hidden" style="margin-bottom:16px">
        <h2><span>組織 Branding</span><span class="ago">僅 admin 可編輯</span></h2>
        <div style="padding:16px">
          <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">公司顯示名稱</label>
          <input id="br-name" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;font:inherit" />
          <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">主色 (HEX #RRGGBB)</label>
          <div style="display:flex;gap:8px;margin-bottom:10px">
            <input id="br-color" style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font:inherit" placeholder="#0066cc" />
            <input id="br-color-picker" type="color" style="width:50px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer" />
          </div>
          <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">Logo URL</label>
          <input id="br-logo" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:12px;font:inherit" placeholder="https://..." />
          <div id="br-msg" style="font-size:12px;margin-bottom:8px"></div>
          <button id="btn-save-branding" style="background:var(--uttag-primary);color:#fff;border:none;padding:8px 16px;border-radius:5px;cursor:pointer;font:inherit">儲存</button>
        </div>
      </div>

      <div class="card profile-card">
        <h2><span>修改密碼</span></h2>
        <div style="padding:16px">
          <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">目前密碼</label>
          <input id="cp-current" type="password" autocomplete="current-password" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;font:inherit" />
          <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">新密碼（至少 8 字元）</label>
          <input id="cp-new" type="password" autocomplete="new-password" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;font:inherit" />
          <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:4px">確認新密碼</label>
          <input id="cp-confirm" type="password" autocomplete="new-password" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:12px;font:inherit" />
          <div id="cp-msg" style="font-size:12px;margin-bottom:8px"></div>
          <button id="btn-change-password" style="background:var(--uttag-primary);color:#fff;border:none;padding:8px 16px;border-radius:5px;cursor:pointer;font:inherit">變更密碼</button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/industry-gate.js"></script>
  <script src="/js/tenant-session.js"></script>
  <script>
    if (!window.TENANT || !TENANT.isLoggedIn()) {
      window.location.replace("/tenant-login.html");
    }
    if (window.UTTAG && UTTAG.bootIndustry) UTTAG.bootIndustry();

    // ---------- helpers ----------
    function escapeHtml(s) {
      if (s == null) return "";
      return String(s).replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
      })[c]);
    }
    function timeAgo(iso) {
      if (!iso) return "—";
      const diff = Date.now() - new Date(iso).getTime();
      const s = Math.max(0, Math.round(diff / 1000));
      if (s < 60)    return s + " 秒前";
      if (s < 3600)  return Math.round(s / 60) + " 分鐘前";
      if (s < 86400) return Math.round(s / 3600) + " 小時前";
      return Math.round(s / 86400) + " 天前";
    }
    async function fetchJSON(url) {
      const res = await fetch(url, { headers: TENANT.getAuthHeader() });
      if (!res.ok) throw new Error("HTTP " + res.status + " " + url);
      return res.json();
    }

    // ---------- tab switching ----------
    const tabs = document.getElementById("tabs");
    tabs.addEventListener("click", ev => {
      const a = ev.target.closest("a[data-tab]");
      if (!a) return;
      ev.preventDefault();
      switchTab(a.dataset.tab);
    });
    function switchTab(name) {
      location.hash = name;
      document.querySelectorAll("nav.tabs a").forEach(a =>
        a.classList.toggle("active", a.dataset.tab === name));
      document.querySelectorAll(".tab-panel").forEach(p =>
        p.classList.toggle("active", p.id === "tab-" + name));
      const loaders = { alerts: loadAlerts, usage: loadUsage, users: loadUsers, profile: loadProfile };
      if (loaders[name]) loaders[name]();
    }
    window.addEventListener("hashchange", () => {
      const h = location.hash.slice(1);
      if (h && document.getElementById("tab-" + h)) switchTab(h);
    });

    // ---------- Dashboard ----------
    function renderDevices(devices) {
      const container = document.getElementById("devices-container");
      document.getElementById("device-count").textContent = devices.length;

      if (!devices.length) {
        container.innerHTML = '<div class="empty">目前沒有綁定裝置。</div>';
        return;
      }
      // Columns adapt to what the API actually returned (field-visibility policy).
      const hasMac  = devices.some(d => "mac" in d);
      const hasTemp = devices.some(d => d.latest_data?.temperature != null);
      const rows = devices.map(d => {
        const latest = d.latest_data || {};
        const temp = latest.temperature != null ? latest.temperature.toFixed(1) + "°C" : "—";
        const status = d.status || "offline";
        const statusLabel = { online: "在線", idle: "閒置", offline: "離線" }[status] || status;
        const label = d.label || d.mac || "—";
        return "<tr>" +
          "<td><strong>" + escapeHtml(label) + "</strong>" +
            (hasMac && d.mac ? '<br/><span class="ago">' + escapeHtml(d.mac) + "</span>" : "") +
          "</td>" +
          "<td><span class=\"status " + status + "\">" + statusLabel + "</span></td>" +
          (hasTemp ? '<td class="temp">' + temp + "</td>" : "") +
          '<td class="ago">' + timeAgo(latest.created_at) + "</td>" +
        "</tr>";
      }).join("");
      container.innerHTML =
        "<table><thead><tr>" +
          "<th>裝置</th><th>狀態</th>" + (hasTemp ? "<th>溫度</th>" : "") + "<th>最後回報</th>" +
        "</tr></thead><tbody>" + rows + "</tbody></table>";
    }
    function renderMap(devices) {
      const map = L.map("map").setView([24.15, 120.68], 7);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19, attribution: "&copy; OpenStreetMap"
      }).addTo(map);
      const pts = [];
      devices.forEach(d => {
        const lat = d.latitude ?? d.lat ?? null;
        const lng = d.longitude ?? d.lng ?? null;
        if (lat == null || lng == null) return;
        pts.push([lat, lng]);
        L.marker([lat, lng]).addTo(map)
          .bindPopup("<strong>" + escapeHtml(d.label || d.mac || "") + "</strong>");
      });
      if (pts.length) {
        map.fitBounds(pts, { padding: [40, 40], maxZoom: 14 });
        document.getElementById("map-status").textContent = pts.length + " 個位置";
      } else {
        document.getElementById("map-status").textContent = "無座標資料";
      }
    }

    // ---------- Alerts ----------
    let alertsLoaded = false;
    async function loadAlerts() {
      if (alertsLoaded) return;
      alertsLoaded = true;
      const container = document.getElementById("alerts-container");
      try {
        const body = await fetchJSON("/api/tenant/alerts");
        const alerts = body.alerts || [];
        document.getElementById("alert-count").textContent = alerts.length;
        if (!alerts.length) {
          container.innerHTML = '<div class="empty">近 24 小時沒有告警，情況良好。</div>';
          return;
        }
        const kindLabel = {
          temp_low: "低溫", temp_high: "高溫",
          humidity_low: "低濕", humidity_high: "高濕",
        };
        const rows = alerts.map(a => "<tr>" +
          '<td class="ago">' + escapeHtml(new Date(a.at).toLocaleString("zh-TW")) + "</td>" +
          "<td><strong>" + escapeHtml(a.label || a.mac) + "</strong></td>" +
          "<td>" + escapeHtml(kindLabel[a.kind] || a.kind) + "</td>" +
          '<td class="temp">' + escapeHtml(a.value) + "</td>" +
          '<td class="temp ago">閾值 ' + escapeHtml(a.threshold) + "</td>" +
          '<td><span class="severity ' + escapeHtml(a.severity) + '">' + escapeHtml(a.severity) + "</span></td>" +
        "</tr>").join("");
        container.innerHTML = "<table><thead><tr>" +
          "<th>時間</th><th>裝置</th><th>類型</th><th>數值</th><th>閾值</th><th>等級</th>" +
          "</tr></thead><tbody>" + rows + "</tbody></table>";
      } catch (err) {
        container.innerHTML = '<div class="empty">載入失敗：' + escapeHtml(err.message) + "</div>";
      }
    }

    // ---------- Usage ----------
    let usageWired = false;
    async function loadUsage() {
      const container = document.getElementById("usage-container");
      const periodSel = document.getElementById("usage-period");
      const exportBtn = document.getElementById("usage-export");
      if (!usageWired) {
        usageWired = true;
        periodSel.addEventListener("change", () => loadUsage());
        exportBtn.addEventListener("click", () => {
          const p = periodSel.value;
          const url = "/api/tenant/usage/export?period=" + encodeURIComponent(p);
          // fetch with auth, then trigger download
          fetch(url, { headers: TENANT.getAuthHeader() })
            .then(r => r.blob())
            .then(blob => {
              const a = document.createElement("a");
              a.href = URL.createObjectURL(blob);
              a.download = "usage_" + p + ".csv";
              a.click();
              setTimeout(() => URL.revokeObjectURL(a.href), 1000);
            })
            .catch(err => alert("匯出失敗：" + err.message));
        });
      }
      container.innerHTML = '<div class="loading">載入用量資料…</div>';
      try {
        const data = await fetchJSON("/api/tenant/usage?period=" + encodeURIComponent(periodSel.value));
        renderUsage(container, data);
      } catch (err) {
        container.innerHTML = '<div class="empty">載入失敗：' + escapeHtml(err.message) + "</div>";
      }
    }

    function renderUsage(container, data) {
      const s = data.summary || {};
      const daily = data.daily_usage || [];
      const totalCalls = s.api_calls_period || 0;
      const totalErrors = s.api_errors_period || 0;
      const errorRate = totalCalls > 0 ? ((totalErrors / totalCalls) * 100).toFixed(2) : "0.00";
      const tier = s.tier || "free";

      // Quota bar helper
      const bar = (pct) => {
        const safe = Math.min(100, Math.max(0, pct || 0));
        const color = safe >= 90 ? "#dc2626" : safe >= 70 ? "#f59e0b" : "var(--uttag-primary)";
        return '<div style="background:#e5e7eb;border-radius:4px;height:6px;overflow:hidden;margin-top:4px;">' +
               '<div style="background:' + color + ';height:100%;width:' + safe + '%;transition:width .3s;"></div></div>';
      };

      const card = (label, value, sub) =>
        '<div style="background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:14px;">' +
          '<div style="font-size:11px;color:var(--muted);margin-bottom:6px;">' + label + '</div>' +
          '<div style="font-size:22px;font-weight:600;color:#111;">' + value + '</div>' +
          (sub || '') +
        '</div>';

      const summaryHtml =
        '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:16px;">' +
          card("方案", '<span style="text-transform:capitalize;">' + escapeHtml(tier) + '</span>') +
          card("API 呼叫 (期間)", totalCalls.toLocaleString()) +
          card("錯誤數", totalErrors.toLocaleString(),
               '<div style="font-size:11px;color:var(--muted);margin-top:4px;">錯誤率 ' + errorRate + '%</div>') +
          card("綁定裝置",
               (s.devices_bound || 0) + (s.devices_limit ? " / " + s.devices_limit : ""),
               s.devices_limit ? bar(s.devices_quota_percent) : "") +
          card("活躍 API Keys",
               (s.api_keys_active || 0) + (s.api_keys_limit ? " / " + s.api_keys_limit : ""),
               s.api_keys_limit ? bar(s.api_keys_quota_percent) : "") +
          card("成員人數", s.users_count || 0) +
        '</div>';

      const chartHtml = drawUsageChart(daily);

      container.innerHTML = summaryHtml + chartHtml;
    }

    function drawUsageChart(daily) {
      if (!daily || daily.length === 0) {
        return '<div class="empty" style="padding:24px;">這段期間沒有 API 呼叫紀錄</div>';
      }
      const W = 720, H = 200, padL = 40, padR = 16, padT = 16, padB = 28;
      const innerW = W - padL - padR, innerH = H - padT - padB;
      const max = Math.max(1, ...daily.map(d => d.request_count));
      const xStep = daily.length > 1 ? innerW / (daily.length - 1) : 0;
      const points = daily.map((d, i) => {
        const x = padL + i * xStep;
        const y = padT + innerH - (d.request_count / max) * innerH;
        return [x, y, d];
      });
      const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
      const areaD = pathD + " L" + points[points.length-1][0].toFixed(1) + "," + (padT + innerH) +
                    " L" + points[0][0].toFixed(1) + "," + (padT + innerH) + " Z";
      const errorPath = points.map((p, i) => {
        const y = padT + innerH - (p[2].error_count / max) * innerH;
        return (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + y.toFixed(1);
      }).join(" ");
      const yLabels = [0, 0.5, 1].map(f => {
        const v = Math.round(max * f);
        const y = padT + innerH - f * innerH;
        return '<text x="' + (padL - 6) + '" y="' + (y + 3) + '" text-anchor="end" font-size="10" fill="#6b7280">' + v + '</text>' +
               '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="#e5e7eb" stroke-dasharray="2,2" />';
      }).join("");
      const xLabels = (() => {
        const showCount = Math.min(7, daily.length);
        const step = Math.max(1, Math.floor(daily.length / showCount));
        let out = "";
        for (let i = 0; i < daily.length; i += step) {
          const x = padL + i * xStep;
          const label = (daily[i].date || "").slice(5); // MM-DD
          out += '<text x="' + x + '" y="' + (H - 8) + '" text-anchor="middle" font-size="10" fill="#6b7280">' + label + '</text>';
        }
        return out;
      })();
      const dots = points.map(p =>
        '<circle cx="' + p[0].toFixed(1) + '" cy="' + p[1].toFixed(1) + '" r="3" fill="var(--uttag-primary)">' +
        '<title>' + (p[2].date || "") + ': ' + p[2].request_count + ' 次 / ' + p[2].error_count + ' 錯誤</title>' +
        '</circle>').join("");
      return '<div style="padding:0 16px 16px;">' +
        '<div style="font-size:13px;font-weight:600;color:#374151;margin:8px 0 4px;">每日 API 呼叫趨勢</div>' +
        '<div style="display:flex;gap:14px;font-size:11px;color:var(--muted);margin-bottom:6px;">' +
          '<span><span style="display:inline-block;width:10px;height:2px;background:var(--uttag-primary);vertical-align:middle;margin-right:4px;"></span>呼叫數</span>' +
          '<span><span style="display:inline-block;width:10px;height:2px;background:#dc2626;vertical-align:middle;margin-right:4px;"></span>錯誤數</span>' +
        '</div>' +
        '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;background:#fff;border:1px solid var(--border);border-radius:8px;">' +
          yLabels +
          '<path d="' + areaD + '" fill="var(--uttag-primary)" fill-opacity="0.08" />' +
          '<path d="' + pathD + '" stroke="var(--uttag-primary)" stroke-width="2" fill="none" />' +
          '<path d="' + errorPath + '" stroke="#dc2626" stroke-width="1.5" fill="none" stroke-dasharray="4,3" />' +
          dots +
          xLabels +
        '</svg>' +
      '</div>';
    }

    // ---------- Users ----------
    let usersLoaded = false;
    async function loadUsers() {
      if (usersLoaded) return;
      usersLoaded = true;
      const container = document.getElementById("users-container");
      try {
        const users = await fetchJSON("/api/tenant/users");
        document.getElementById("users-count").textContent = users.length;

        // Announce the role-based field visibility so the demo is self-documenting.
        const me = TENANT.user || {};
        const roleNote = {
          admin:    "你是管理員，可看見完整欄位（email / 電話 / 最後登入）",
          operator: "你是操作員，隱藏電話與最後登入時間",
          user:     "你是檢視者，僅能看到成員姓名與角色",
        }[me.role] || "";
        document.getElementById("users-note").textContent = roleNote;

        if (!users.length) {
          container.innerHTML = '<div class="empty">沒有成員。</div>';
          return;
        }

        const cols = [];
        if ("name"  in users[0]) cols.push({ key: "name",  label: "姓名" });
        if ("role"  in users[0]) cols.push({ key: "role",  label: "角色", kind: "role" });
        if ("email" in users[0]) cols.push({ key: "email", label: "Email" });
        if ("phone" in users[0]) cols.push({ key: "phone", label: "電話" });
        if ("status" in users[0]) cols.push({ key: "status", label: "狀態" });
        if ("last_login_at" in users[0]) cols.push({ key: "last_login_at", label: "最後登入", kind: "ago" });
        if ("login_count"   in users[0]) cols.push({ key: "login_count",   label: "登入次數" });

        const rows = users.map(u => "<tr>" + cols.map(c => {
          const v = u[c.key];
          if (c.kind === "role") {
            return '<td><span class="role-pill ' + escapeHtml(v) + '">' + escapeHtml(v || "") + "</span></td>";
          }
          if (c.kind === "ago") {
            return '<td class="ago">' + (v ? escapeHtml(new Date(v).toLocaleString("zh-TW")) : "—") + "</td>";
          }
          return "<td>" + escapeHtml(v ?? "—") + "</td>";
        }).join("") + "</tr>").join("");

        container.innerHTML = "<table><thead><tr>" +
          cols.map(c => "<th>" + c.label + "</th>").join("") +
          "</tr></thead><tbody>" + rows + "</tbody></table>";
      } catch (err) {
        container.innerHTML = '<div class="empty">載入失敗：' + escapeHtml(err.message) + "</div>";
      }
    }

    // ---------- Profile ----------
    let profileLoaded = false;
    async function loadProfile() {
      if (profileLoaded) return;
      profileLoaded = true;
      const container = document.getElementById("profile-container");
      try {
        const me = await fetchJSON("/api/tenant/auth/me");
        const u = me.user || {};
        const c = u.clients || {};
        const rows = [
          ["姓名", escapeHtml(u.name || "")],
          ["Email", escapeHtml(u.email || "")],
          ["角色", '<span class="role-pill ' + escapeHtml(u.role) + '">' + escapeHtml(u.role || "") + "</span>"],
          ["組織", escapeHtml(c.name || "")],
          ["產業", escapeHtml(me.industry_defaults?.display_name || me.industry || "")],
          ["方案", escapeHtml(c.tier || "")],
          ["最後登入", u.last_login_at ? escapeHtml(new Date(u.last_login_at).toLocaleString("zh-TW")) : "—"],
          ["登入次數", escapeHtml(u.login_count ?? 0)],
          ["權限數", escapeHtml((me.permissions || []).length)],
        ];
        container.innerHTML = rows.map(r =>
          '<div class="profile-row"><span class="label">' + r[0] + "</span><span>" + r[1] + "</span></div>"
        ).join("");
      } catch (err) {
        container.innerHTML = '<div class="empty">載入失敗：' + escapeHtml(err.message) + "</div>";
      }
    }

    // ---------- Role-aware UI ----------
    let currentRole = null;

    function paintRoleUI(me) {
      currentRole = me?.user?.role;
      // Only admin sees the "+ 新增成員" button and the branding editor card.
      const newBtn = document.getElementById("btn-new-member");
      const brandCard = document.getElementById("branding-card");
      if (currentRole === "admin") {
        newBtn.classList.remove("hidden");
        brandCard.classList.remove("hidden");
      } else {
        newBtn.classList.add("hidden");
        brandCard.classList.add("hidden");
      }

      // Impersonation banner.
      const imp = me?.impersonated_by;
      if (imp) {
        document.getElementById("impersonation-text").textContent =
          "你正在以 " + (me.user?.email || "") + " 身份預覽（由 admin " +
          (imp.admin_username || imp.admin_id || "?") + " 代入中）— token 於 15 分鐘後過期";
        document.getElementById("impersonation-banner").classList.remove("hidden");
      }
    }

    // ---------- New member modal ----------
    function bindMemberModal() {
      const modal = document.getElementById("member-modal");
      const open  = () => {
        modal.classList.remove("hidden");
        document.getElementById("nm-err").textContent = "";
      };
      const close = () => modal.classList.add("hidden");
      document.getElementById("btn-new-member").addEventListener("click", open);
      document.getElementById("nm-cancel").addEventListener("click", close);
      document.getElementById("nm-submit").addEventListener("click", async () => {
        const email = document.getElementById("nm-email").value.trim();
        const name  = document.getElementById("nm-name").value.trim();
        const role  = document.getElementById("nm-role").value;
        const pass  = document.getElementById("nm-pass").value;
        const err   = document.getElementById("nm-err");
        err.textContent = "";
        if (!email || !name || !pass) { err.textContent = "Email、姓名、密碼皆為必填"; return; }
        if (pass.length < 8) { err.textContent = "密碼需至少 8 字元"; return; }
        try {
          const r = await fetch("/api/tenant/users", {
            method: "POST",
            headers: { "Content-Type": "application/json", ...TENANT.getAuthHeader() },
            body: JSON.stringify({ email, name, role, password: pass }),
          });
          const body = await r.json();
          if (!r.ok) throw new Error(body.error || "HTTP " + r.status);
          close();
          usersLoaded = false;
          loadUsers();
          ["nm-email","nm-name","nm-pass"].forEach(id => document.getElementById(id).value = "");
        } catch (e) {
          err.textContent = e.message;
        }
      });
    }

    // ---------- Change password ----------
    function bindChangePassword() {
      document.getElementById("btn-change-password").addEventListener("click", async () => {
        const cur  = document.getElementById("cp-current").value;
        const next = document.getElementById("cp-new").value;
        const conf = document.getElementById("cp-confirm").value;
        const msg  = document.getElementById("cp-msg");
        msg.style.color = "#b91c1c";
        if (!cur || !next) { msg.textContent = "請填寫目前與新密碼"; return; }
        if (next.length < 8) { msg.textContent = "新密碼需至少 8 字元"; return; }
        if (next !== conf) { msg.textContent = "兩次輸入的新密碼不一致"; return; }
        try {
          const r = await fetch("/api/tenant/auth/change-password", {
            method: "POST",
            headers: { "Content-Type": "application/json", ...TENANT.getAuthHeader() },
            body: JSON.stringify({ current_password: cur, new_password: next }),
          });
          const body = await r.json();
          if (!r.ok) throw new Error(body.error || "HTTP " + r.status);
          msg.style.color = "#166534";
          msg.textContent = "密碼已更新，下次登入請用新密碼";
          ["cp-current","cp-new","cp-confirm"].forEach(id => document.getElementById(id).value = "");
        } catch (e) {
          msg.textContent = "變更失敗：" + e.message;
        }
      });
    }

    // ---------- Branding ----------
    async function loadBranding() {
      try {
        const s = await fetchJSON("/api/tenant/settings");
        // Apply primary color override if set.
        if (s.primary_color) {
          document.documentElement.style.setProperty("--uttag-primary", s.primary_color);
        }
        // Override company name in subtitle if configured.
        if (s.company_name_display) {
          const sub = document.getElementById("subtitle");
          const parts = (sub.textContent || "").split("　·　");
          parts[0] = s.company_name_display;
          sub.textContent = parts.join("　·　");
        }
        // Populate the admin-only editor.
        if (currentRole === "admin") {
          document.getElementById("br-name").value   = s.company_name_display || "";
          document.getElementById("br-color").value  = s.primary_color || "";
          document.getElementById("br-color-picker").value = s.primary_color || "#0066cc";
          document.getElementById("br-logo").value   = s.logo_url || "";
        }
      } catch (err) {
        console.warn("[branding] load failed:", err.message);
      }
    }

    function bindBranding() {
      document.getElementById("br-color-picker").addEventListener("input", (e) => {
        document.getElementById("br-color").value = e.target.value;
      });
      document.getElementById("btn-save-branding").addEventListener("click", async () => {
        const msg = document.getElementById("br-msg");
        const body = {
          company_name_display: document.getElementById("br-name").value.trim() || null,
          primary_color:        document.getElementById("br-color").value.trim() || null,
          logo_url:             document.getElementById("br-logo").value.trim() || null,
        };
        // Drop null keys so server-side validation only sees what we're updating.
        Object.keys(body).forEach(k => { if (body[k] == null || body[k] === "") delete body[k]; });
        msg.style.color = "#b91c1c";
        if (body.primary_color && !/^#[0-9a-fA-F]{6}$/.test(body.primary_color)) {
          msg.textContent = "主色必須是 #RRGGBB 格式"; return;
        }
        try {
          const r = await fetch("/api/tenant/settings", {
            method: "PUT",
            headers: { "Content-Type": "application/json", ...TENANT.getAuthHeader() },
            body: JSON.stringify(body),
          });
          const resp = await r.json();
          if (!r.ok) throw new Error(resp.error || "HTTP " + r.status);
          msg.style.color = "#166534";
          msg.textContent = "Branding 已更新（重整生效）";
          if (body.primary_color) {
            document.documentElement.style.setProperty("--uttag-primary", body.primary_color);
          }
        } catch (e) {
          msg.textContent = "儲存失敗：" + e.message;
        }
      });
    }

    // ---------- End impersonation ----------
    document.getElementById("btn-end-impersonation").addEventListener("click", () => {
      localStorage.removeItem("tenant_token");
      localStorage.removeItem("tenant_user");
      localStorage.removeItem("uttag_industry_ctx");
      window.location.href = "/admin-impersonate.html";
    });

    // ---------- Bootstrap ----------
    async function bootstrap() {
      if (!TENANT || !TENANT.isLoggedIn()) return;
      try {
        const [me, devices] = await Promise.all([
          fetchJSON("/api/tenant/auth/me"),
          fetchJSON("/api/tenant/devices"),
        ]);
        const clientName = me?.user?.clients?.name || me?.user?.client_name || "—";
        const userName = me?.user?.name || me?.user?.email || "";
        document.getElementById("welcome").textContent = "嗨，" + userName;
        document.getElementById("subtitle").textContent = clientName + "　·　" +
          (me?.industry_defaults?.display_name || me?.industry || "") +
          "　·　角色 " + (me?.user?.role || "");

        paintRoleUI(me);
        loadBranding();
        renderDevices(devices || []);
        renderMap(devices || []);

        const h = location.hash.slice(1);
        if (h && document.getElementById("tab-" + h)) switchTab(h);
      } catch (err) {
        document.getElementById("welcome").textContent = "載入失敗";
        document.getElementById("subtitle").textContent = err.message;
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      bindMemberModal();
      bindChangePassword();
      bindBranding();
      bootstrap();
    });
  </script>
</body>
</html>
