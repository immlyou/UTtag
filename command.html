<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>指揮中心 · Command Center</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #05060a;
      --panel: rgba(17,25,40,.65);
      --border: rgba(255,255,255,.1);
      --accent: #3b82f6;
      --text: #e5e7eb;
      --muted: rgba(229,231,235,.55);
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
    }
    body.momo {
      --accent: #e01e5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: "Inter", "Noto Sans TC", -apple-system, system-ui, sans-serif; color: var(--text); background: var(--bg); overflow: hidden; }
    body {
      background: radial-gradient(ellipse at top, rgba(59,130,246,.12), transparent 60%),
                  radial-gradient(ellipse at bottom right, rgba(224,30,90,.08), transparent 55%),
                  var(--bg);
      display: grid;
      grid-template-rows: 56px 1fr 48px;
      grid-template-columns: 320px 1fr 360px;
      grid-template-areas:
        "hdr hdr hdr"
        "kpi map alerts"
        "tick tick tick";
      gap: 10px;
      padding: 10px;
    }
    header {
      grid-area: hdr;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 18px;
      background: linear-gradient(90deg, rgba(255,255,255,.02), transparent);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 1px;
      padding: 6px 10px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent), rgba(168,85,247,.8));
      color: #fff;
    }
    header h1 { font-size: 18px; font-weight: 600; flex: 1; }
    header .time { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent); text-shadow: 0 0 12px currentColor; }
    header .date { font-size: 12px; color: var(--muted); margin-left: 8px; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
    }
    .panel h2 {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    #kpi-col { grid-area: kpi; display: flex; flex-direction: column; gap: 10px; }
    .kpi-big {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 0;
    }
    .kpi-big .label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
    .kpi-big .value {
      font-size: 72px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      background: linear-gradient(180deg, #fff, rgba(255,255,255,.5));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px currentColor;
    }
    .kpi-big.accent .value { color: var(--accent); }
    .kpi-big.warn .value   { color: var(--warn); }
    .kpi-big.danger .value { color: var(--danger); }
    .kpi-big .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    #map-panel { grid-area: map; position: relative; }
    #map { width: 100%; height: 100%; background: #0b1120; }
    .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.85) saturate(0.5); }

    #alerts-col { grid-area: alerts; display: flex; flex-direction: column; }
    #alerts-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    .alert-item {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      background: rgba(255,255,255,.03);
      border-left: 3px solid var(--warn);
      animation: slideIn .4s ease-out;
    }
    .alert-item.high   { border-left-color: var(--danger); background: rgba(239,68,68,.08); }
    .alert-item.info   { border-left-color: var(--accent); }
    .alert-item .mac { color: var(--muted); font-size: 10px; font-family: "SF Mono", monospace; }
    .alert-item .msg { margin-top: 2px; }
    .alert-item .time { font-size: 10px; color: var(--muted); }
    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    #ticker {
      grid-area: tick;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 13px;
      color: var(--text);
      background: linear-gradient(90deg, rgba(224,30,90,.1), rgba(59,130,246,.08));
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      white-space: nowrap;
    }
    #ticker-inner {
      display: inline-block;
      animation: scroll 45s linear infinite;
      padding-left: 100%;
    }
    #ticker-inner span { margin: 0 30px; color: var(--muted); }
    #ticker-inner span b { color: var(--accent); }
    @keyframes scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }

    .badge-live {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; padding: 2px 8px;
      border-radius: 10px;
      background: rgba(239,68,68,.15); color: #fca5a5;
      font-weight: 700; letter-spacing: 1px;
    }
    .badge-live::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--danger);
      animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity: .3; } }
  </style>
</head>
<body>
  <header>
    <span class="logo">UT</span>
    <h1>指揮中心 <span class="badge-live">LIVE</span></h1>
    <div><span class="time" id="clock">--:--:--</span><span class="date" id="date"></span></div>
  </header>

  <div id="kpi-col">
    <div class="panel kpi-big accent"><div class="label">運送中</div><div class="value" id="k-online">--</div><div class="sub">Online</div></div>
    <div class="panel kpi-big warn"><div class="label">異常中</div><div class="value" id="k-alert">--</div><div class="sub">Alerts (24h)</div></div>
    <div class="panel kpi-big"><div class="label">棧板總數</div><div class="value" id="k-total">--</div><div class="sub">Total</div></div>
  </div>

  <div class="panel" id="map-panel"><div id="map"></div></div>

  <div class="panel" id="alerts-col">
    <h2>即時告警流 <span style="float:right;font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0;">每 15s 刷新</span></h2>
    <div id="alerts-list"><div style="padding:24px;text-align:center;color:var(--muted);font-size:12px;">載入中…</div></div>
  </div>

  <div id="ticker"><div id="ticker-inner"><span>連線指揮中心…</span></div></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/tenant-session.js"></script>
  <script>
    if (!window.TENANT || !TENANT.isLoggedIn()) {
      alert("請先登入 tenant 帳號");
      location.href = "/tenant-login.html?next=/command.html";
    }
    if (new URLSearchParams(location.search).get("demo") === "momo" ||
        localStorage.getItem("uttag_demo_theme") === "momo") {
      document.body.classList.add("momo");
      document.querySelector(".logo").textContent = "MO";
      document.title = "MOMO 指揮中心 · " + document.title;
    }

    // Clock
    function tick() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      document.getElementById("clock").textContent = pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());
      document.getElementById("date").textContent = d.getFullYear() + "/" + pad(d.getMonth()+1) + "/" + pad(d.getDate());
    }
    tick(); setInterval(tick, 1000);

    // Map
    const map = L.map("map", { zoomControl: false, attributionControl: false }).setView([23.8, 120.9], 7);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 18 }).addTo(map);
    let markers = {};

    async function fetchJSON(url) {
      const r = await fetch(url, { headers: TENANT.getAuthHeader() });
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }

    async function refresh() {
      try {
        const [devData, alertData, usageData] = await Promise.all([
          fetchJSON("/api/tenant/devices").catch(() => ([])),
          fetchJSON("/api/tenant/alerts").catch(() => ({alerts:[]})),
          fetchJSON("/api/tenant/usage?period=7d").catch(() => ({summary:{}, daily_usage:[]})),
        ]);
        const devices = Array.isArray(devData) ? devData : (devData.devices || []);
        const alerts = alertData.alerts || [];
        const summary = usageData.summary || {};

        // KPIs
        const now = Date.now();
        const online = devices.filter(d => {
          const t = d.latest_data?.created_at || d.last_seen;
          return t && (now - new Date(t).getTime()) < 3600000;
        }).length;
        document.getElementById("k-online").textContent = online.toLocaleString();
        document.getElementById("k-alert").textContent = alerts.length.toLocaleString();
        document.getElementById("k-total").textContent = devices.length.toLocaleString();

        // Map markers
        const seen = new Set();
        devices.forEach(d => {
          const lat = d.latitude ?? d.lat ?? null;
          const lng = d.longitude ?? d.lng ?? null;
          if (lat == null || lng == null) return;
          const key = d.mac || d.label;
          seen.add(key);
          const color = d.status === "offline" ? "#6b7280" : (d.alert ? "#f59e0b" : "#22c55e");
          const icon = L.divIcon({
            className: "",
            html: '<div style="width:12px;height:12px;background:' + color + ';border:2px solid #fff;border-radius:50%;box-shadow:0 0 12px ' + color + ';"></div>',
            iconSize: [12,12], iconAnchor: [6,6],
          });
          if (markers[key]) { markers[key].setLatLng([lat,lng]); markers[key].setIcon(icon); }
          else { markers[key] = L.marker([lat,lng], { icon }).addTo(map).bindTooltip(d.label || key); }
        });
        Object.keys(markers).forEach(k => { if (!seen.has(k)) { map.removeLayer(markers[k]); delete markers[k]; } });

        // Alert feed
        const listEl = document.getElementById("alerts-list");
        if (alerts.length === 0) {
          listEl.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--success);font-size:13px;">✓ 近 24 小時無告警</div>';
        } else {
          listEl.innerHTML = alerts.slice(0, 50).map(a => {
            const sev = a.severity === "high" ? "high" : a.severity === "low" ? "info" : "";
            const kindLabel = ({temp_low:"低溫",temp_high:"高溫",humidity_low:"低濕",humidity_high:"高濕"})[a.kind] || a.kind;
            return '<div class="alert-item ' + sev + '">' +
              '<div style="flex:1;min-width:0;">' +
                '<div><strong>' + escapeHtml(a.label || a.mac) + '</strong>' +
                ' <span class="mac">' + escapeHtml(a.mac || "") + '</span></div>' +
                '<div class="msg">' + escapeHtml(kindLabel) + ' · ' + escapeHtml(String(a.value)) + ' (閾值 ' + escapeHtml(String(a.threshold)) + ')</div>' +
              '</div>' +
              '<div class="time">' + timeAgo(a.at) + '</div>' +
            '</div>';
          }).join("");
        }

        // Ticker
        const daily = usageData.daily_usage || [];
        const weekCalls = daily.reduce((s,d) => s + (d.request_count || 0), 0);
        const parts = [
          `方案 <b>${summary.tier || "free"}</b>`,
          `綁定裝置 <b>${summary.devices_bound || 0}</b> / ${summary.devices_limit || "—"}`,
          `近 7 日呼叫 <b>${weekCalls.toLocaleString()}</b>`,
          `告警 24h <b>${alerts.length}</b>`,
          `LIVE 同步時間 <b>${new Date().toLocaleTimeString("zh-TW")}</b>`,
          `UTtag · Command Center · 系統正常運行中`,
        ];
        document.getElementById("ticker-inner").innerHTML = parts.map(p => "<span>" + p + "</span>").join("");
      } catch (e) {
        console.error(e);
      }
    }

    function escapeHtml(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
    }
    function timeAgo(iso) {
      if (!iso) return "—";
      const s = Math.max(0, Math.round((Date.now() - new Date(iso).getTime()) / 1000));
      if (s < 60)    return s + "s";
      if (s < 3600)  return Math.round(s/60) + "m";
      if (s < 86400) return Math.round(s/3600) + "h";
      return Math.round(s/86400) + "d";
    }

    refresh();
    setInterval(refresh, 15000);

    // F11 hint
    setTimeout(() => {
      if (!document.fullscreenElement) {
        const hint = document.createElement("div");
        hint.style.cssText = "position:fixed;right:16px;bottom:60px;background:rgba(0,0,0,.7);color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;z-index:1000;animation:slideIn .5s;cursor:pointer;";
        hint.innerHTML = "💡 按 F11 進入全螢幕 · 或點我";
        hint.onclick = () => { document.documentElement.requestFullscreen?.(); hint.remove(); };
        document.body.appendChild(hint);
        setTimeout(() => hint.remove(), 10000);
      }
    }, 3000);
  </script>
</body>
</html>
