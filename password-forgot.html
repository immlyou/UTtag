<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTtag — 忘記密碼</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --text:      #f1f5f9;
      --text-muted:#94a3b8;
      --primary:   #3b82f6;
      --primary-h: #2563eb;
      --error-bg:  #450a0a;
      --error-text:#fca5a5;
      --success-bg:#052e16;
      --success-text:#86efac;
      --radius:    8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--primary);
      border-radius: 14px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #fff;
      margin-bottom: 12px;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .logo p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: var(--primary);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .btn-submit {
      width: 100%;
      background: var(--primary);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      margin-top: 8px;
      transition: background 0.15s;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--primary-h);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-box {
      background: var(--error-bg);
      border: 1px solid #7f1d1d;
      border-radius: var(--radius);
      color: var(--error-text);
      font-size: 13px;
      padding: 10px 12px;
      margin-top: 16px;
      display: none;
    }

    .error-box.visible { display: block; }

    .success-box {
      background: var(--success-bg);
      border: 1px solid #166534;
      border-radius: var(--radius);
      color: var(--success-text);
      font-size: 13px;
      padding: 10px 12px;
      margin-top: 16px;
      display: none;
    }

    .success-box.visible { display: block; }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .back-link a {
      color: var(--primary);
      text-decoration: none;
    }

    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">UT</div>
      <h1>忘記密碼</h1>
      <p>輸入您的電子信箱，我們將寄送重設連結</p>
    </div>

    <form id="forgot-form" novalidate>
      <div class="field">
        <label for="email">電子信箱</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="name@company.com"
          autocomplete="email"
          required
        />
      </div>

      <button type="submit" class="btn-submit" id="btn-submit">寄送重設連結</button>
      <div class="error-box" id="error-box" role="alert"></div>
      <div class="success-box" id="success-box" role="status"></div>
    </form>

    <div class="back-link">
      <a href="/tenant-login.html">返回登入</a>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var form       = document.getElementById("forgot-form");
      var btn        = document.getElementById("btn-submit");
      var errBox     = document.getElementById("error-box");
      var successBox = document.getElementById("success-box");

      function showError(msg) {
        errBox.textContent = msg;
        errBox.classList.add("visible");
        successBox.classList.remove("visible");
      }

      function showSuccess(msg) {
        successBox.textContent = msg;
        successBox.classList.add("visible");
        errBox.classList.remove("visible");
      }

      function clearMessages() {
        errBox.classList.remove("visible");
        successBox.classList.remove("visible");
      }

      function setLoading(on) {
        btn.disabled = on;
        btn.textContent = on ? "寄送中..." : "寄送重設連結";
      }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        clearMessages();

        var email = document.getElementById("email").value.trim();

        if (!email) {
          showError("請填寫電子信箱。");
          return;
        }

        setLoading(true);

        try {
          var resp = await fetch("/api/tenant/password/forgot", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email })
          });

          // Always show the same success message to prevent user enumeration
          showSuccess("若此電子信箱有註冊，我們已寄出密碼重設連結，請查收信箱。");
          form.querySelector("input").disabled = true;
          btn.disabled = true;
          btn.textContent = "已寄出";
        } catch (err) {
          showError("網路錯誤，請確認連線後再試。");
        } finally {
          setLoading(false);
        }
      });
    })();
  </script>
</body>
</html>
